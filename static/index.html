<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울우유 AI 챗봇</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary:   #003087;
  --primary-l: #1a4fa8;
  --accent:    #00aaff;
  --white:     #ffffff;
  --gray-50:   #f8f9fc;
  --gray-100:  #eef1f7;
  --gray-300:  #c8d0e0;
  --gray-500:  #7a8aa0;
  --gray-700:  #3a4a60;
  --text:      #1a2a3a;
  --shadow: 0 4px 24px rgba(0,48,135,0.10);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--gray-50); color: var(--text); }

.app {
  display: flex; flex-direction: column;
  height: 100vh; max-width: 760px; margin: 0 auto;
  background: var(--white); box-shadow: var(--shadow);
}

/* 헤더 */
.header {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 24px; background: var(--primary); color: var(--white); flex-shrink: 0;
}
.header-logo {
  width: 42px; height: 42px; background: var(--white); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
}
.header-info { flex: 1; }
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }
.header-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.8); }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* 채팅 영역 */
.chat-area {
  flex: 1; overflow-y: auto; padding: 24px 20px;
  display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

/* 환영 메시지 */
.welcome { text-align: center; padding: 32px 20px 16px; }
.welcome-icon { font-size: 48px; margin-bottom: 12px; }
.welcome-title { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
.welcome-desc { font-size: 14px; color: var(--gray-500); line-height: 1.6; }
.welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
.chip {
  padding: 8px 14px; border: 1.5px solid var(--gray-300); border-radius: 20px;
  font-size: 13px; color: var(--gray-700); cursor: pointer; transition: all 0.2s; background: var(--white);
}
.chip:hover { border-color: var(--primary); color: var(--primary); background: rgba(0,48,135,0.04); }

/* 메시지 버블 */
.msg { display: flex; gap: 10px; align-items: flex-end; }
.msg.user { flex-direction: row-reverse; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; background: var(--gray-100);
}
.msg.user .avatar { background: var(--primary); }

.bubble {
  max-width: 72%; padding: 12px 16px; border-radius: 18px;
  font-size: 14px; line-height: 1.65; word-break: keep-all;
}
.msg.bot .bubble {
  background: var(--white); border: 1.5px solid var(--gray-100);
  border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); color: var(--text);
}
.msg.user .bubble { background: var(--primary); color: var(--white); border-bottom-right-radius: 4px; }

/* ✅ 제품 카드 그리드 */
.product-cards {
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
  max-width: 100%;
}
.product-card {
  background: var(--white);
  border: 1.5px solid var(--gray-100);
  border-radius: 12px;
  overflow: hidden;
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  cursor: pointer;
}
.product-card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,48,135,0.12);
}
.product-card-img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: contain;
  background: var(--gray-50);
  padding: 6px;
}
.product-card-img-placeholder {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--gray-50);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}
.product-card-name {
  font-size: 11px;
  font-weight: 500;
  padding: 8px 8px 10px;
  text-align: center;
  line-height: 1.3;
  word-break: keep-all;
  color: var(--gray-700);
}

/* 출처 태그 (FAQ/레시피용) */
.sources { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
.source-tag {
  font-size: 11px; padding: 3px 9px; border-radius: 10px;
  background: rgba(0,48,135,0.07); color: var(--primary); border: 1px solid rgba(0,48,135,0.15);
}

/* 타이핑 인디케이터 */
.typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
.typing span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gray-300); animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

/* 입력창 */
.input-area { padding: 16px 20px; background: var(--white); border-top: 1.5px solid var(--gray-100); flex-shrink: 0; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.input-box {
  flex: 1; min-height: 44px; max-height: 120px; padding: 11px 16px;
  border: 1.5px solid var(--gray-300); border-radius: 22px;
  font-family: inherit; font-size: 14px; color: var(--text);
  resize: none; outline: none; transition: border-color 0.2s; line-height: 1.5; overflow-y: auto;
}
.input-box:focus { border-color: var(--primary); }
.input-box::placeholder { color: var(--gray-500); }

.send-btn {
  width: 44px; height: 44px; border-radius: 50%; background: var(--primary);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s, transform 0.1s;
}
.send-btn:hover { background: var(--primary-l); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { background: var(--gray-300); cursor: not-allowed; }
.send-btn svg { width: 18px; height: 18px; fill: white; }

.input-hint { font-size: 11px; color: var(--gray-500); text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-logo">🥛</div>
    <div class="header-info">
      <div class="header-title">서울우유 AI 어시스턴트</div>
      <div class="header-sub">제품 · FAQ · 레시피 무엇이든 물어보세요</div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      온라인
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome">
      <div class="welcome-icon">🐄</div>
      <div class="welcome-title">안녕하세요! 서울우유 AI입니다</div>
      <div class="welcome-desc">
        제품 정보, 영양성분, 레시피, 자주 묻는 질문 등<br>
        서울우유에 대한 모든 것을 도와드립니다.
      </div>
      <div class="welcome-chips">
        <div class="chip" onclick="sendChip('흰우유 영양성분 알려줘')">🥛 흰우유 영양성분</div>
        <div class="chip" onclick="sendChip('우유로 만들 수 있는 레시피 추천해줘')">🍳 우유 레시피</div>
        <div class="chip" onclick="sendChip('유통기한 관련 FAQ 알려줘')">❓ 유통기한 FAQ</div>
        <div class="chip" onclick="sendChip('서울우유 제품 종류 뭐가 있어?')">📋 제품 목록</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea class="input-box" id="inputBox" placeholder="서울우유에 대해 무엇이든 물어보세요..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
  </div>

</div>

<script>
const chatArea = document.getElementById('chatArea');
const inputBox = document.getElementById('inputBox');
const sendBtn  = document.getElementById('sendBtn');

let history = [];

inputBox.addEventListener('input', () => {
  inputBox.style.height = 'auto';
  inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + 'px';
});

inputBox.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendChip(text) {
  inputBox.value = text;
  sendMessage();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ✅ 출처를 product 카드 / 태그로 분리해서 렌더링
function renderSources(sources) {
  if (!sources || !sources.length) return '';

  const products = sources.filter(s => s.type === 'product');
  const others   = sources.filter(s => s.type !== 'product');

  let html = '';

  // 제품 카드 그리드
  if (products.length) {
    html += '<div class="product-cards">';
    for (const p of products) {
      const name = escapeHtml(p.label || '');
      const imgHtml = p.image_url
        ? `<img class="product-card-img" src="${escapeHtml(p.image_url)}" alt="${name}" onerror="this.outerHTML='<div class=\\'product-card-img-placeholder\\'>🥛</div>'">`
        : `<div class="product-card-img-placeholder">🥛</div>`;
      const wrapperTag = p.url ? 'a' : 'div';
      const hrefAttr = p.url ? `href="${escapeHtml(p.url)}" target="_blank" rel="noopener"` : '';
      html += `
        <${wrapperTag} class="product-card" ${hrefAttr}>
          ${imgHtml}
          <div class="product-card-name">${name}</div>
        </${wrapperTag}>
      `;
    }
    html += '</div>';
  }

  // FAQ / 레시피는 기존 태그 스타일
  if (others.length) {
    html += '<div class="sources">';
    for (const o of others) {
      const icon = o.type === 'faq' ? '❓' : '🍳';
      html += `<span class="source-tag">${icon} ${escapeHtml(o.label || '')}</span>`;
    }
    html += '</div>';
  }

  return html;
}

function appendMessage(role, content, sources = []) {
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'bot'}`;

  const avatar = isUser ? '👤' : '🥛';
  const sourcesHtml = !isUser ? renderSources(sources) : '';

  div.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div>
      <div class="bubble">${escapeHtml(content).replace(/\n/g, '<br>')}</div>
      ${sourcesHtml}
    </div>
  `;
  chatArea.appendChild(div);
  scrollToBottom();
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `
    <div class="avatar">🥛</div>
    <div class="bubble typing"><span></span><span></span><span></span></div>
  `;
  chatArea.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text) return;

  inputBox.value = '';
  inputBox.style.height = 'auto';
  sendBtn.disabled = true;

  appendMessage('user', text);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(-10) }),
    });

    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      appendMessage('bot', `❌ 오류: ${data.detail || '서버 오류가 발생했습니다.'}`);
    } else {
      appendMessage('bot', data.answer, data.sources || []);
      history.push({ role: 'assistant', content: data.answer });
    }
  } catch (e) {
    removeTyping();
    appendMessage('bot', '❌ 네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }

  sendBtn.disabled = false;
  inputBox.focus();
}
</script>
</body>
</html>
